window.onload = function() {

let selectedQuestions = [];
let currentQuestionIndex = 0;

let timeLeft = 10;
let isPaused = false;
let isCafeSoloMode = false;

let questions = [];

let usedQuestions = [];

const categoryFiles = {

let selectedCategories = [];

function startDemo() {

function toggleCategory(category, button) {
  if (category === "ALL") return;

  if (selectedCategories.includes(category)) {
    selectedCategories = selectedCategories.filter(c => c !== category);
    button.classList.remove("active");
  } else {
    selectedCategories.push(category);
    button.classList.add("active");
  }

  // Skontroluj, či sú všetky kategórie vybrané
  const allBtn = document.querySelector(".category-btn:last-child"); // tlačidlo ALL
  if (selectedCategories.length === Object.keys(categoryFiles).length) {
    allBtn.classList.add("active");
  } else {
    allBtn.classList.remove("active");
  }

  console.log("Vybrané kategórie:", selectedCategories);
}


function selectAllCategories(button) {
  // Ak je ALL už aktívne, odznačíme všetko
  if (button.classList.contains("active")) {
    selectedCategories = [];
    document.querySelectorAll(".category-btn").forEach(btn => btn.classList.remove("active"));

    document.querySelectorAll(".category-btn").forEach(btn => btn.classList.add("active"));
  }

  console.log("Vybrané kategórie:", selectedCategories);
}
    
function shuffle(array) {
for (let i = array.length - 1; i > 0; i--) {
const j = Math.floor(Math.random() * (i + 1));
[array[i], array[j]] = [array[j], array[i]];
}
}

function setTime(selectedTime) {
	userSelectedTime = selectedTime;

	document.querySelectorAll(".time-button").forEach(btn => btn.classList.remove("active"));
	const clickedBtn = Array.from(document.querySelectorAll(".time-button")).find(btn => btn.innerText.includes(selectedTime));
	if (clickedBtn) clickedBtn.classList.add("active");
}


function adjustFontSizeForQuestion() {
	const questionDiv = document.getElementById("question");
  	const isMobile = window.innerWidth <= 768;
	 // Nastavíme inú počiatočnú veľkosť pre mobil/desktop
  	let fontSize = isMobile ? 40 : 120;
    const minFontSize = isMobile ? 16 : 20;
	questionDiv.style.fontSize = fontSize + "px";
	 // Ak sa text nezmestí, zmenšuj fontSize až po minimálnu hodnotu
  	while (questionDiv.scrollHeight > questionDiv.clientHeight && fontSize > minFontSize) {
    fontSize -= 1;
    questionDiv.style.fontSize = fontSize + "px";
}
}


function adjustFontSizeForAnswers() {
    const isMobile = window.innerWidth <= 768;
    const buttons = document.querySelectorAll('.answer-button');
    buttons.forEach(button => {
    const textDiv = button.querySelector('.answer-text');
    let fontSize = isMobile ? 28 : 72; // menšia veľkosť pre mobil
    textDiv.style.fontSize = fontSize + 'px';
    while (textDiv.scrollHeight > button.clientHeight && fontSize > 12) {
    fontSize -= 1;
    textDiv.style.fontSize = fontSize + 'px';
}
});
}


function startGame() {

  if (selectedCategories.length === 0) {
    alert("Vyber aspoň jednu kategóriu!");
    return;
  }

  const filesToLoad = selectedCategories.map(cat => categoryFiles[cat]);

  Promise.all(filesToLoad.map(file => fetch(file).then(res => res.json())))
.then(jsonSubory => {

})
.catch(error => console.error("Chyba pri načítaní otázok:", error));
}


function showQuestion() {
    const q = selectedQuestions[currentQuestionIndex];

    // Zamiešame odpovede
    const shuffledAnswers = [...q.answers];
    shuffle(shuffledAnswers);

    // Zistíme index správnej odpovede po zamiešaní
    const correctIndex = shuffledAnswers.indexOf(q.answers[q.correct]);
    selectedQuestions[currentQuestionIndex].shuffledCorrect = correctIndex;

    // Zobrazíme otázku
    const questionDiv = document.getElementById("question");
	questionDiv.style.color = "#333"; // 🔥 reset farby na čiernu
    /*questionDiv.innerText = q.question;*/
    questionDiv.innerHTML = fixWidows(q.question).replace(/\n/g, "<br>");
	
    // ← tu zavolaj zmenšovanie veľkosti písma
	
    requestAnimationFrame(() => {
    adjustFontSizeForQuestion();
});

    // Zobrazíme počítadlo otázok
    document.getElementById("counter").innerText = 
        `Otázka ${currentQuestionIndex + 1} / ${selectedQuestions.length}`;

    // Zobrazíme odpovede
    document.querySelectorAll(".answer-button").forEach((btn, i) => {
        if (isCafeSoloMode) {
            // 🔥 v SOLO režime odpovede skryjeme
            btn.style.display = "none";
        } else {
            btn.style.display = "flex";
            btn.querySelector(".answer-text").innerText = shuffledAnswers[i];
            btn.querySelector(".answer-letter").innerText = ['A', 'B', 'C', 'D'][i];
            btn.style.backgroundColor = "#ddd";
            btn.style.color = "black";
        }
    });

    // Prispôsobenie veľkosti písma pre odpovede
    adjustFontSizeForAnswers();

    // Nastavenie časovača
    timeLeft = userSelectedTime;
    document.getElementById("timer").innerText = "Čas: " + timeLeft;

    // Zrušenie predchádzajúceho intervalu
    clearInterval(timerInterval);
    isPaused = false;
    document.querySelector(".stop-button").innerText = "STOP";

    // Spustenie nového intervalu odpočítavania
    timerInterval = setInterval(() => {
        if (!isPaused) {
            timeLeft--;
            document.getElementById("timer").innerText = "Čas: " + timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                highlightCorrectAnswer();
            }
        }
    }, 1000);
}

	function fixWidows(text) {

  // spojky a krátke slová, ktoré nechceme nechať osamote
  const shortWords = ["a", "i", "v", "s", "z", "o", "u", "k"];

  shortWords.forEach(word => {
    const regex = new RegExp(`\\s${word}\\s`, "gi");
    text = text.replace(regex, ` ${word}&nbsp;`);
  });

  return text;
}

  if (isCafeSoloMode) {

    questionDiv.style.color = "green";
adjustFontSizeForQuestion();   // 🔥 TOTO DOPLŇ
  } else {
    const correctButton = document.querySelectorAll(".answer-button")[selectedQuestions[currentQuestionIndex].shuffledCorrect];
    correctButton.style.backgroundColor = "#4CAF50";
    correctButton.style.color = "white";
  }

  currentQuestionIndex++;

  if (currentQuestionIndex < selectedQuestions.length) {

    setTimeout(() => {
      document.getElementById("question").style.color = "#333";
      showQuestion();
    }, 2000);

} else {

    setTimeout(() => {

      if (isTucetMode) {

  if (demoMode) {

        document.querySelector(".question-container").style.display = "none";

        if (demoMode) {
          document.getElementById("demoPopup").style.display = "flex";

}
}

	function startTucetMode() {

  if (selectedCategories.length === 0) {
    alert("Vyber aspoň jednu kategóriu!");
    return;
  }

  isTucetMode = true;
  usedQuestions = []; // reset

  const filesToLoad = selectedCategories.map(cat => categoryFiles[cat]);

  Promise.all(filesToLoad.map(file => fetch(file).then(res => res.json())))
    .then(jsonSubory => {

      if (demoMode) {
        // 🔥 DEMO – z každej kategórie len 12 otázok
        questions = jsonSubory.map(cat => cat.slice(0, 12));
      } else {
        // 🔥 FULL – celé kategórie
        questions = jsonSubory;
      }

      document.querySelector(".start-container").style.display = "none";
      document.querySelector(".question-container").style.display = "flex";

      startNewTucetCycle();
    });
}

function startNewTucetCycle() {

  let result = [];

  // 🔥 AK JE LEN 1 alebo 2 kategórie → vezmi 12 otázok celkovo
  if (questions.length <= 2) {

    let allQuestions = questions.flat();

    // odfiltruj už použité
    let available = allQuestions.filter(q => !usedQuestions.includes(q));

    if (available.length < 12) {
      usedQuestions = [];
      available = [...allQuestions];
    }

    shuffle(available);

    result = available.slice(0, 12);
    usedQuestions.push(...result);

  } else {

  let totalNeeded = 12;
  let perCategory = Math.floor(totalNeeded / questions.length);
  let remainder = totalNeeded % questions.length;

  questions.forEach((categoryArray, index) => {

    let take = perCategory;

    // prvé kategórie dostanú +1 (aby bol súčet 12)
    if (index < remainder) {
      take += 1;
    }

    let available = categoryArray.filter(q => !usedQuestions.includes(q));

    if (available.length < take) {
      available = [...categoryArray];
      usedQuestions = usedQuestions.filter(q => !categoryArray.includes(q));
    }

    shuffle(available);

    let selected = available.slice(0, take);
    result.push(...selected);
    usedQuestions.push(...selected);

  });
}

  shuffle(result);

  tucetQuestions = result;
  selectedQuestions = [...tucetQuestions];

  currentQuestionIndex = 0;

  showQuestion();
}

	function buildInfinityQuestions(categories) {

  // skopíruj a premiešaj každú kategóriu zvlášť
  let shuffledCategories = categories.map(cat => {
    let copy = [...cat];
    shuffle(copy);
    return copy;
  });

  let result = [];
  let index = 0;
  let hasMore = true;

  while (hasMore) {
    hasMore = false;

    for (let i = 0; i < shuffledCategories.length; i++) {
      if (index < shuffledCategories[i].length) {
        result.push(shuffledCategories[i][index]);
        hasMore = true;
      }
    }

    index++;
  }

  return result;
}
